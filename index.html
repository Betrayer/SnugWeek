<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <script>
      (function () {
        try {
          var papers = {
            milk: "#faf6ef",
            lavender: "#f6f4fb",
            sage: "#f3f6f1",
            peach: "#fdf3ee",
            midnight: "#1c1f27",
            snow: "#fcfcfb",
            mono: "#f6f6f5",
            noir: "#161616",
            sky: "#f2f6fb",
            cocoa: "#f6efe6",
          };
          var inks = {
            milk: "#7d6e5f",
            lavender: "#6f6582",
            sage: "#667064",
            peach: "#79604f",
            midnight: "#b3ab9c",
            snow: "#6b6862",
            mono: "#5c5c5c",
            noir: "#b0b0b0",
            sky: "#5d6975",
            cocoa: "#6f5d4c",
          };
          var stored = localStorage.getItem("snugweek-theme");
          var id;
          if (stored && stored.indexOf("auto:") === 0) {
            var pair = stored.split(":");
            var prefersDark =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
            id = prefersDark ? pair[2] : pair[1];
          } else {
            id = stored;
          }
          if (!papers[id]) id = "milk";
          var root = document.documentElement;
          root.dataset.snugTheme = id;
          root.style.setProperty("--boot-paper", papers[id]);
          root.style.setProperty("--boot-ink", inks[id]);
          if (localStorage.getItem("snugweek-paper-texture") === "on")
            root.dataset.paperTexture = "on";
        } catch (e) {}
      })();
    </script>
    <style>
      html {
        background-color: var(--boot-paper, #faf6ef);
      }
      #sw-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--boot-paper, #faf6ef);
        color: var(--boot-ink, #7d6e5f);
        font-family: "Caveat", "Segoe Script", cursive;
        font-weight: 600;
        font-size: 44px;
        letter-spacing: 0.5px;
      }
    </style>

    />
    <meta name="theme-color" content="#faf6ef" />

        try {

          if (name) document.getElementById("sw-boot").textContent = name;
